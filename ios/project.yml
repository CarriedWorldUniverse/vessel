name: Vessel
options:
  bundleIdPrefix: universe.carriedworld
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
targets:
  Vessel:
    type: application
    platform: iOS
    sources:
      - path: Vessel
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: universe.carriedworld.vessel
        PRODUCT_NAME: Vessel
        INFOPLIST_FILE: Vessel/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Vessel/Resources/Info.plist
      properties:
        CFBundleDisplayName: Vessel
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: Vessel uses the microphone to capture your spoken prompt.
        NSSpeechRecognitionUsageDescription: Vessel uses speech recognition to transcribe your prompt.
        NSSupportsLiveActivities: false

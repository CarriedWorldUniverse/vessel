apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: voxcpm-cache
  namespace: nexus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 80Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vessel-voxcpm
  namespace: nexus
  labels:
    app: vessel-voxcpm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vessel-voxcpm
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vessel-voxcpm
    spec:
      runtimeClassName: nvidia
      containers:
        - name: voxcpm
          image: localhost/vessel-voxcpm:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: VESSEL_VOXCPM_MODEL
              value: openbmb/VoxCPM2
            - name: VESSEL_VOXCPM_PRELOAD
              value: "1"
            - name: VESSEL_VOXCPM_WARMUP_TEXT
              value: "(neutral clear voice) Vessel voice service is ready."
            - name: HF_HOME
              value: /root/.cache/huggingface
            - name: MODELSCOPE_CACHE
              value: /root/.cache/modelscope
            - name: PIP_CACHE_DIR
              value: /root/.cache/pip
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: compute,utility
          command:
            - python3
            - /opt/vessel/voxcpm/server.py
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: cache
              mountPath: /root/.cache
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: voxcpm-cache
---
apiVersion: v1
kind: Service
metadata:
  name: vessel-voxcpm
  namespace: nexus
  labels:
    app: vessel-voxcpm
spec:
  type: NodePort
  selector:
    app: vessel-voxcpm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30435
